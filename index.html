<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/icon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <meta name="theme-color" content="#0ea5e9" />
    <link rel="manifest" href="/manifest.json" />
    <title>Focus Master</title>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;800&display=swap" rel="stylesheet">
  </head>
  <body>
    <div id="app">
      <div id="ui-layer">
        <header>
          <div class="level-badge">Level <span id="level-display">1</span></div>
          <div class="timer">Time: <span id="time-display">0.00</span>s / <span id="max-time-display">18</span>s</div>
        </header>
        <div id="game-container">
          <div id="start-screen" class="screen active">
            <h1>Focus Master</h1>
            <p>Tap the numbers in ascending order as fast as you can. Train your focus.</p>
            <button id="start-btn" class="primary-btn">Start Game</button>
          </div>
          <div id="play-screen" class="screen">
            <div id="grid" class="grid"></div>
            <div id="target-number">Find: <span>1</span></div>
          </div>
          <div id="level-up-screen" class="screen">
            <h2>Level Complete!</h2>
            <p>Time: <span id="level-time"></span>s</p>
            <button id="next-level-btn" class="primary-btn">Next Level</button>
          </div>
          <div id="game-over-screen" class="screen">
            <h2>Game Over</h2>
            <p>You reached Level <span id="final-level"></span></p>
            <button id="restart-btn" class="primary-btn">Play Again</button>
          </div>
        </div>
      </div>
    </div>
    <script type="module" src="/src/main.js"></script>
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('./sw.js').then(registration => {
            console.log('SW registered: ', registration);
          }).catch(registrationError => {
            console.log('SW registration failed: ', registrationError);
          });
        });
      }
    </script>
  </body>
</html>
